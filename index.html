<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Messages</title>
    <!-- Include Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: #f2f2f7; display: flex; flex-direction: column; height: 100vh; }
        header { background: #fff; padding: 15px; border-bottom: 1px solid #d1d1d6; text-align: center; font-weight: 600; font-size: 18px; color: #1c1c1e; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .other { background: #e5e5ea; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .me { background: #007aff; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .sender { font-size: 11px; margin-bottom: 2px; opacity: 0.6; }
        .input-area { background: #fff; padding: 12px; border-top: 1px solid #d1d1d6; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #d1d1d6; border-radius: 20px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #007aff; }
        button { background: #007aff; color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: transform 0.1s; }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <header>Messages</header>
    <div id="chat"></div>
    <div id="previewArea" style="display: none; padding: 10px; background: #fff; border-top: 1px solid #d1d1d6; white-space: nowrap; overflow-x: auto;"></div>
    <div class="input-area">
        <button id="attachBtn" style="background: #007aff; font-size: 24px;">+</button>
        <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*" multiple>
        <input type="text" id="msgInput" placeholder="iMessage" autocomplete="off">
        <button id="sendBtn">↑</button>
    </div>

    <script>
        // CONFIGURATION
        const firebaseConfig = {
            databaseURL: "https://ephone-36837-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const chatRef = database.ref('global_chat');

        const chatDiv = document.getElementById('chat');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');

        let pendingFiles = [];

        attachBtn.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const id = Date.now() + Math.random();
                    pendingFiles.push({ id, file, data: event.target.result });
                    renderPreviews();
                };
                reader.readAsArrayBuffer(file);
            });
            fileInput.value = '';
        };

        function renderPreviews() {
            previewArea.innerHTML = '';
            if (pendingFiles.length === 0) {
                previewArea.style.display = 'none';
                return;
            }
            previewArea.style.display = 'block';
            pendingFiles.forEach((pf, index) => {
                const container = document.createElement('div');
                container.style.display = 'inline-block';
                container.style.position = 'relative';
                container.style.marginRight = '10px';
                
                const preview = document.createElement(pf.file.type.startsWith('video/') ? 'video' : 'img');
                preview.style.height = '60px';
                preview.style.borderRadius = '8px';
                preview.style.background = '#000';
                
                if (pf.file.type.startsWith('image/')) {
                    const blob = new Blob([pf.data], { type: pf.file.type });
                    preview.src = URL.createObjectURL(blob);
                } else {
                    // Placeholder for video
                    preview.poster = "https://img.icons8.com/ios-filled/50/000000/video-trimming.png";
                }

                const removeBtn = document.createElement('div');
                removeBtn.textContent = '×';
                removeBtn.style.position = 'absolute';
                removeBtn.style.top = '-5px';
                removeBtn.style.right = '-5px';
                removeBtn.style.background = 'rgba(0,0,0,0.6)';
                removeBtn.style.color = '#fff';
                removeBtn.style.borderRadius = '50%';
                removeBtn.style.width = '20px';
                removeBtn.style.height = '20px';
                removeBtn.style.textAlign = 'center';
                removeBtn.style.cursor = 'pointer';
                removeBtn.onclick = () => {
                    pendingFiles.splice(index, 1);
                    renderPreviews();
                };

                container.appendChild(preview);
                container.appendChild(removeBtn);
                previewArea.appendChild(container);
            });
        }

        async function uploadFile(pf) {
            const bytes = new Uint8Array(pf.data);
            const filename = pf.file.name;
            const fileSize = bytes.length;
            const fileType = pf.file.type.startsWith('image/') ? 1 : 2;
            
            const meta = { type: 'file_meta', filename, size: fileSize, fileType };
            
            try {
                const res = await fetch('/upload_meta', { method: 'POST', body: JSON.stringify(meta) });
                if (res.ok) {
                    const chunkSize = 200;
                    const totalChunks = Math.ceil(fileSize / chunkSize);
                    for (let i = 0; i < totalChunks; i++) {
                        const chunk = bytes.slice(i * chunkSize, (i + 1) * chunkSize);
                        await fetch('/upload_chunk', {
                            method: 'POST',
                            headers: { 'X-Chunk-Idx': i },
                            body: chunk
                        });
                    }
                    return true;
                }
            } catch (err) {
                console.error("Upload failed", err);
            }
            return false;
        }

        async function send() {
            const text = msgInput.value.trim();
            if (!text && pendingFiles.length === 0) return;

            // Upload files first
            for (let pf of pendingFiles) {
                await uploadFile(pf);
            }
            pendingFiles = [];
            renderPreviews();

            // Send text message
            if (text) {
                chatRef.push({
                    sender: myName,
                    text: text,
                    timestamp: Date.now()
                });
                msgInput.value = '';
            }
            
            // Trigger ESP-NOW for text as well (the sendBtn callback was actually doing fetch('/send') in previous version)
            // But here we rely on the Gateway polling Firebase. 
            // Wait, the previous version had fetch('/send?text='...). Let me keep that for real-time ESP-NOW push.
            if (text) {
                fetch('/send?text=' + encodeURIComponent(text));
            }
        }

        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') send(); };

        // ... (remaining Firebase listener / polling code) ...
        let myName = localStorage.getItem('chatName');
        if (!myName) {
            myName = prompt("Enter your name:") || "Guest_" + Math.floor(Math.random()*1000);
            localStorage.setItem('chatName', myName);
        }

        chatRef.limitToLast(50).on('value', (snapshot) => {
            chatDiv.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.entries(data).forEach(([key, msg]) => {
                    const isMe = msg.sender === myName;
                    const bubble = document.createElement('div');
                    bubble.className = `msg ${isMe ? 'me' : 'other'}`;
                    bubble.style.alignSelf = isMe ? 'flex-end' : 'flex-start';
                    bubble.innerHTML = `<div class="sender">${msg.sender}</div><div>${msg.text}</div>`;
                    chatDiv.appendChild(bubble);
                });
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        });
    </script>
</body>
</html>
