<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatter</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="module" crossorigin src="/ePhone/chatter/assets/index-DtjAUYYo.js"></script>
  <link rel="stylesheet" crossorigin href="/ePhone/chatter/assets/index-BN8oyei0.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav>
      <div class="logo"><i class="fa-solid fa-comment-dots"></i></div>
      <div id="nav-home" class="nav-link active"><i class="fa-solid fa-house"></i> <span>Home</span></div>
      <div id="nav-explore" class="nav-link"><i class="fa-solid fa-hashtag"></i> <span>Explore</span></div>
      <div id="nav-profile" class="nav-link"><i class="fa-solid fa-user"></i> <span>Profile</span></div>
      <button class="btn-post" id="btn-sidebar-post">Post</button>
      
      <div id="user-profile-mini" class="nav-link" style="margin-top: auto;">
        <div id="mini-avatar" class="avatar" style="background-image: url('https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png')"></div>
        <div style="flex: 1; margin-left: 10px;" class="hidden-mobile">
          <div id="mini-name" class="post-name">Guest</div>
          <div id="mini-username" class="post-username">@guest</div>
        </div>
        <i id="btn-logout" class="fa-solid fa-right-from-bracket" style="margin-left: auto; cursor: pointer;"></i>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main>
      <div class="header">
        <span id="main-header-text">Home</span>
      </div>

      <!-- Section: Home Feed -->
      <section id="section-home">
        <!-- Post Input -->
        <div id="post-creator" class="post-input-container">
          <div id="post-avatar" class="avatar" style="background-image: url('https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png')"></div>
          <div class="post-form">
            <textarea id="post-textarea" placeholder="What's happening?" rows="1"></textarea>
            <div id="image-preview-container" class="hidden" style="margin-top: 10px; position: relative;">
              <img id="image-preview" src="" style="width: 100%; border-radius: 16px;">
              <button id="remove-image" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer;">&times;</button>
            </div>
            <div class="post-actions">
              <div class="post-icons">
                <label for="image-input" style="cursor: pointer;">
                  <i class="fa-regular fa-image"></i>
                </label>
                <input type="file" id="image-input" accept="image/*" class="hidden">
              </div>
              <button id="btn-submit-post" class="btn-post-sm">Post</button>
            </div>
          </div>
        </div>

        <div id="feed-container"></div>
      </section>

      <!-- Section: Explore -->
      <section id="section-explore" class="hidden">
        <div style="padding: 20px;">
          <h2 style="margin-bottom: 20px;">What's happening</h2>
          <div class="trending-box" style="background: transparent; padding: 0;">
            <div class="trending-item">
              <div class="trending-topic">Technology · Trending</div>
              <div class="trending-name">Chatter v1.0</div>
              <div class="trending-count">Launched today!</div>
            </div>
            <div class="trending-item">
              <div class="trending-topic">Coding</div>
              <div class="trending-name">#Firebase</div>
              <div class="trending-count">Real-time DB active</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section: Profile -->
      <section id="section-profile" class="hidden">
        <div id="profile-banner-el" class="profile-banner"></div>
        <div class="profile-info">
          <div id="profile-avatar-el" class="profile-avatar-large" style="background-image: url('https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png')"></div>
          <button id="btn-edit-profile-open" class="btn-edit-profile">Edit profile</button>
          <div class="profile-meta">
            <h2 id="profile-name">Name</h2>
            <div id="profile-username" style="color: var(--text-secondary);">@username</div>
            <div id="profile-bio" class="profile-bio">Just joined Chatter!</div>
            <div class="profile-stats">
              <span><b>0</b> Following</span>
              <span><b>0</b> Followers</span>
            </div>
          </div>
        </div>
        <div id="profile-feed-container"></div>
      </section>
    </main>

    <!-- Right Sidebar -->
    <aside>
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass" style="color: var(--text-secondary);"></i>
        <input type="text" placeholder="Search Chatter">
      </div>
      <div id="dynamic-news-container" class="trending-box">
        <h2 style="font-size: 1.2rem; font-weight: 800;">Real News</h2>
        <div class="loading" style="padding: 10px; color: var(--text-secondary); font-size: 0.9rem;">Loading news...</div>
      </div>
    </aside>

    <!-- Mobile Navigation -->
    <div class="mobile-nav">
      <i id="mob-nav-home" class="fa-solid fa-house active"></i>
      <i id="mob-nav-explore" class="fa-solid fa-magnifying-glass"></i>
      <i id="mob-nav-profile" class="fa-solid fa-user"></i>
    </div>
    <div id="fab-post" class="fab"><i class="fa-solid fa-plus"></i></div>
  </div>

  <!-- Modals -->
  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal-content" style="width: 500px;">
      <div class="modal-header">
        <div class="logo" style="margin: 0;"><i class="fa-solid fa-comment-dots"></i></div>
      </div>
      <h1 id="auth-title" class="auth-title" style="font-size: 2rem;">Join Chatter today</h1>
      <div id="auth-fields" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="auth-name" placeholder="Full Name" class="auth-input">
        <input type="email" id="auth-email" placeholder="Email" class="auth-input">
        <input type="password" id="auth-password" placeholder="Password" class="auth-input">
      </div>
      <button id="btn-auth-submit" class="btn-auth">Sign up</button>
      <div style="text-align: center; color: var(--text-secondary);">
        <span id="auth-switch-text">Already have an account?</span>
        <button id="btn-auth-switch" style="background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; padding-left: 5px;">Log in</button>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="edit-profile-modal" class="modal-overlay hidden">
    <div class="modal-content" style="width: 500px;">
      <div class="modal-header">
        <h2 class="modal-title">Edit Profile</h2>
        <button id="btn-edit-profile-save" class="btn-post-sm">Save</button>
      </div>
      <div style="display: flex; flex-direction: column; gap: 15px;">
        <div>
          <label style="color: var(--text-secondary); font-size: 0.9rem;">Name</label>
          <input type="text" id="edit-name" class="auth-input" style="width: 100%;">
        </div>
        <div>
          <label style="color: var(--text-secondary); font-size: 0.9rem;">Bio</label>
          <textarea id="edit-bio" class="auth-input" style="width: 100%; height: 80px; resize: none;"></textarea>
        </div>
        <div style="display: flex; gap: 10px;">
          <div style="flex: 1;">
            <label style="color: var(--text-secondary); font-size: 0.9rem;">Avatar</label>
            <input type="file" id="edit-avatar-file" class="hidden" accept="image/*">
            <button id="btn-upload-avatar" class="btn-auth-outline" style="width: 100%; padding: 10px; border: 1px solid var(--border); font-size: 0.9rem;">Upload Pic</button>
          </div>
          <div style="flex: 1;">
            <label style="color: var(--text-secondary); font-size: 0.9rem;">Banner Color</label>
            <input type="color" id="edit-banner-color" style="width: 100%; height: 40px; background: none; border: 1px solid var(--border); cursor: pointer;">
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="edit-show-email" style="width: 20px; height: 20px;">
          <label for="edit-show-email">Show email on profile</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Comment Modal -->
  <div id="comment-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <button id="close-comment" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
        <button id="btn-submit-comment" class="btn-post-sm">Reply</button>
      </div>
      <div id="target-post-preview" style="border-left: 2px solid var(--border); margin-left: 24px; padding-left: 24px; padding-bottom: 20px;"></div>
      <div style="display: flex; gap: 12px;">
        <div id="comment-avatar" class="avatar" style="background-image: url('https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png')"></div>
        <textarea id="comment-textarea" placeholder="Post your reply" style="font-size: 1.2rem;"></textarea>
      </div>
    </div>
  </div>

</body>
</html>
